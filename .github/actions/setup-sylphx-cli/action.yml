name: Setup Sylphx CLI
description: Install a pinned @sylphx/cli for read-only management-plane probes in CI.

inputs:
  version:
    description: npm dist-tag or exact version for @sylphx/cli
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Install @sylphx/cli
      shell: bash
      run: |
        set -euo pipefail
        npm install -g "@sylphx/cli@${{ inputs.version }}"
        sylphx --version