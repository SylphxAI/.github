name: Release

# Compatibility shim: the legacy bump-based release pipeline now delegates to the
# Changesets-based `publish-npm.yml`. Consumers keep calling this workflow
# unchanged (`uses: SylphxAI/.github/.github/workflows/release.yml@main`) and are
# transparently migrated off @sylphx/bump onto changesets/action. All repos
# already ship `.changeset/config.json` + write changeset files, so there is no
# per-repo or developer-workflow change. The `version`/`publish` commands run
# changesets via bunx, so a repo does not need @changesets/cli as a devDependency.

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Working directory'
        type: string
        default: '.'
      build:
        description: 'Build command (skipped when `artifact` is set)'
        type: string
        default: 'bun run build'
      prebuild:
        description: 'Legacy alias for `build`'
        type: string
        default: ''
      artifact:
        description: 'When set, download prebuilt artifacts instead of building (e.g. bindings-*)'
        type: string
        default: ''
      prepublish:
        description: 'Command to run before publishing (e.g. reorganize artifacts into npm/*)'
        type: string
        default: ''
      postpublish:
        description: 'Command to run after a successful publish'
        type: string
        default: ''
    secrets:
      NPM_TOKEN:
        required: false
      SLACK_WEBHOOK:
        required: false

jobs:
  release:
    uses: ./.github/workflows/publish-npm.yml
    with:
      working-directory: ${{ inputs.working-directory }}
      build-command: ${{ inputs.prebuild != '' && inputs.prebuild || inputs.build }}
      skip-build: ${{ inputs.artifact != '' }}
      download-artifacts: ${{ inputs.artifact != '' }}
      pre-publish-command: ${{ inputs.prepublish }}
      post-publish-command: ${{ inputs.postpublish }}
      version-command: 'bunx @changesets/cli version'
      publish-command: 'bunx @changesets/cli publish'
    secrets: inherit
