name: public-skills-merge-queue-barrier

on:
  pull_request:
  merge_group:

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

jobs:
  barrier:
    name: public-skills-merge-queue-barrier/pass
    # The workflow also exists in the public source repository. Skip only that
    # source copy; every ruleset target, including an accidental one, executes
    # the controller and must pass the immutable target-identity checks.
    if: ${{ github.repository_id != 1091169653 }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout the protected source at the ruleset workflow commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: SylphxAI/.github
          ref: ${{ github.workflow_sha }}
          fetch-depth: 1
          persist-credentials: false
          path: barrier-source
      - name: Enforce the merge-queue activation barrier
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPORT_PATH: ${{ runner.temp }}/public-skills-merge-queue-barrier.json
          SOURCE_ROOT: ${{ github.workspace }}/barrier-source
          SOURCE_SHA: ${{ github.workflow_sha }}
        run: |
          node "$SOURCE_ROOT/scripts/public-skills-merge-queue-barrier.mjs" \
            --policy "$SOURCE_ROOT/policies/public-skills-merge-queue-barrier.json" \
            --event "$GITHUB_EVENT_PATH" \
            --source-root "$SOURCE_ROOT" \
            --source-sha "$SOURCE_SHA" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$GITHUB_REPOSITORY_ID" \
            --repository-node-id "${{ github.event.repository.node_id }}" \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-ref "$GITHUB_REF" \
            --candidate-sha "$GITHUB_SHA" \
            --report "$REPORT_PATH"
      - name: Preserve merge-queue barrier evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: public-skills-merge-queue-barrier-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/public-skills-merge-queue-barrier.json
          if-no-files-found: error
          retention-days: 90
