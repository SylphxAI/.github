name: Project control

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  project-control:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.14.0"
      - name: Check Changesets publisher syntax
        run: node --check .github/actions/setup-changesets-publisher/changesets-publish.mjs
      - name: Test public-skills external admission control
        run: node --test tests/public-skills-admission.test.mjs
      - name: Test public-skills merge-queue barrier control
        run: node --test tests/public-skills-merge-queue-barrier.test.mjs
      - name: Test public-skills organization ruleset executor
        run: python3 -B tests/test_public_skills_ruleset_executor.py
